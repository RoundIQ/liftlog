<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0e0e0e;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f0;
  --muted: #888;
  --orange: #e8601b;
  --orange2: rgba(232,96,27,0.12);
  --green: #22c55e;
  --green2: rgba(34,197,94,0.1);
  --blue: #3b82f6;
  --blue2: rgba(59,130,246,0.1);
  --purple: #a855f7;
  --teal: #14b8a6;
  --gold: #f59e0b;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
body { display: flex; flex-direction: column; min-height: 100vh; overscroll-behavior: none; }

/* ── Top bar ── */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 20; }
.topbar-logo { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.topbar-logo span { color: var(--orange); }
.export-btn { background: var(--orange); color: #fff; border: none; border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity .15s; }
.export-btn:hover { opacity: .85; }
.export-btn:active { opacity: .7; transform: scale(.97); }

/* ── Day selector ── */
.day-scroller { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
.day-pill { width: 100%; }
.day-scroller::-webkit-scrollbar { display: none; }
.day-pill { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 14px; border-radius: 100px; border: 0.5px solid var(--border2); background: var(--bg2); cursor: pointer; transition: all .15s; }
.day-pill:active { transform: scale(.95); }
.day-pill.active { background: var(--orange); border-color: var(--orange); }
.day-pill.rest-day { border-style: dashed; }
.day-label { font-size: 11px; font-weight: 500; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .06em; }
.day-pill.active .day-label { color: rgba(255,255,255,.75); }
.day-name { font-size: 13px; font-weight: 600; color: var(--text); }
.day-pill.active .day-name { color: #fff; }

/* ── Main content ── */
.content { flex: 1; padding: 20px; max-width: 600px; width: 100%; margin: 0 auto; }
.day-header { margin-bottom: 20px; }
.day-header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
.day-title { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; line-height: 1.2; }
.day-tag { font-size: 12px; color: var(--muted); margin-top: 4px; }
.day-accent { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.complete-badge { display: flex; align-items: center; gap: 5px; background: var(--green2); border: 0.5px solid rgba(34,197,94,.2); color: var(--green); font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 100px; white-space: nowrap; }

/* ── Exercise cards ── */
.ex-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: border-color .15s; }
.ex-card.logged { border-color: rgba(34,197,94,.25); }
.ex-card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; gap: 12px; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
.ex-meta { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
.ex-status { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; transition: all .2s; }
.ex-card.logged .ex-status { background: var(--green); border-color: var(--green); }
.ex-status svg { width: 14px; height: 14px; stroke: var(--muted); }
.ex-card.logged .ex-status svg { stroke: #fff; }

.ex-inputs { padding: 0 16px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.input-group { display: flex; flex-direction: column; gap: 4px; }
.input-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; font-family: 'DM Mono', monospace; }
.input-field { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 16px; font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; width: 100%; outline: none; transition: border-color .15s; -webkit-appearance: none; }
.input-field:focus { border-color: var(--orange); }
.input-field::placeholder { color: rgba(255,255,255,.2); font-weight: 400; }
.note-row { padding: 0 16px 14px; }
.coaching-note { font-size: 12px; color: var(--muted); line-height: 1.5; padding: 10px 12px; background: var(--bg3); border-radius: var(--radius-sm); border-left: 2px solid var(--orange); }

/* ── Finisher block ── */
.finisher { background: linear-gradient(135deg, rgba(232,96,27,.08), rgba(232,96,27,.03)); border: 0.5px solid rgba(232,96,27,.2); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
.finisher-label { font-size: 11px; font-weight: 500; color: var(--orange); text-transform: uppercase; letter-spacing: .08em; font-family: 'DM Mono', monospace; margin-bottom: 6px; }
.finisher-text { font-size: 13px; color: var(--text); line-height: 1.55; }

/* ── Rest day ── */
.rest-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; }
.rest-icon { width: 64px; height: 64px; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
.rest-icon svg { width: 28px; height: 28px; stroke: var(--muted); }
.rest-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.rest-sub { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 280px; }
.rest-tips { margin-top: 24px; width: 100%; max-width: 340px; }
.rest-tip { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; text-align: left; font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; }
.rest-tip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); flex-shrink: 0; margin-top: 5px; }

/* ── Bottom save bar ── */
.save-bar { position: sticky; bottom: 0; background: var(--bg); border-top: 0.5px solid var(--border); padding: 12px 20px; display: flex; gap: 10px; }
.save-btn { flex: 1; background: var(--orange); color: #fff; border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity .15s; }
.save-btn:active { opacity: .8; transform: scale(.98); }
.clear-btn { background: var(--bg2); color: var(--muted); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 14px 18px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; }
.clear-btn:active { opacity: .7; }

/* ── History ── */
.history-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 14px; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; margin-bottom: 12px; font-family: 'DM Sans', sans-serif; }
.history-panel { display: none; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.history-panel.open { display: block; }
.history-entry { padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
.history-entry:last-child { border-bottom: none; }
.history-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
.history-ex { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }
.history-ex-name { color: var(--muted); }
.history-ex-val { font-weight: 500; font-family: 'DM Mono', monospace; color: var(--text); }

/* ── Toast ── */
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 100px; padding: 10px 18px; font-size: 13px; font-weight: 500; opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap; z-index: 100; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(34,197,94,.3); color: var(--green); }

/* ── Animations ── */
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.ex-card { animation: fadeIn .2s ease both; }
.ex-card:nth-child(1){animation-delay:.03s}
.ex-card:nth-child(2){animation-delay:.06s}
.ex-card:nth-child(3){animation-delay:.09s}
.ex-card:nth-child(4){animation-delay:.12s}
.ex-card:nth-child(5){animation-delay:.15s}
.ex-card:nth-child(6){animation-delay:.18s}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">LIFT<span>.</span>LOG</div>
  <button class="export-btn" onclick="exportToExcel()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export Excel
  </button>
</div>

<div class="day-scroller" id="dayScroller"></div>
<div class="content" id="mainContent"></div>

<div class="save-bar" id="saveBar" style="display:none">
  <button class="clear-btn" onclick="clearDay()">Clear</button>
  <button class="save-btn" onclick="saveDay()">Save workout</button>
</div>

<div class="toast" id="toast"></div>

<script>
const PLAN = [
  {
    id: 0, day: "Mon", name: "Upper — Push", tag: "Chest · Shoulders · Triceps", color: "#3b82f6", isRest: false,
    exercises: [
      { name: "Barbell Bench Press", sets: "4", reps: "6–8", note: "Main strength builder. Add 5 lb when you hit 8 clean reps across all sets." },
      { name: "DB Shoulder Press", sets: "3", reps: "10–12", note: "Control the negative — 2 sec down." },
      { name: "DB Lateral Raise", sets: "3", reps: "12–15", note: "Light weight, strict form. No swinging. Slight bend in elbow." },
      { name: "Tricep Pushdowns (pulley)", sets: "3", reps: "12–15", note: "Keep elbows pinned to sides. Squeeze at full extension." },
      { name: "Cable Chest Fly (pulley)", sets: "3", reps: "12–15", note: "Arms slightly bent throughout. Squeeze pecs at the peak." },
    ],
    finisher: "Treadmill incline walk — Incline 6–8 · Speed 3.0–3.5 mph · 15 min · Zone 2"
  },
  {
    id: 1, day: "Tue", name: "Lower — Quads", tag: "Quads · Glutes · Hamstrings", color: "#22c55e", isRest: false,
    exercises: [
      { name: "DB Bulgarian Split Squat", sets: "4", reps: "8–10 ea", note: "Rear foot elevated on bench. Keep front shin vertical. Your bodyweight alone is significant load." },
      { name: "DB Romanian Deadlift", sets: "3", reps: "10–12", note: "Hinge at hips, soft bend in knees. Feel the hamstring stretch." },
      { name: "KB Goblet Squat (50 lb)", sets: "3", reps: "15", note: "Hold KB at chest. Full depth. Pause 1 sec at bottom." },
      { name: "DB Walking Lunge", sets: "3", reps: "12 ea leg", note: "Controlled, upright torso. Drive through front heel to stand." },
      { name: "KB Swing (50 lb)", sets: "4", reps: "20", note: "Hinge-driven, not a squat. Snap hips. Powerful glute squeeze at top." },
    ],
    finisher: "Treadmill incline walk — Incline 8–10 · Speed 3.0–3.5 mph · 20 min"
  },
  {
    id: 2, day: "Wed", name: "Conditioning", tag: "HIIT or KB Circuit", color: "#e8601b", isRest: false,
    exercises: [
      { name: "Option A: Treadmill HIIT", sets: "8 rounds", reps: "30s sprint / 90s walk", note: "5 min warm-up walk → 8 rounds → 5 min cool-down. Total ~25 min." },
      { name: "Option B: KB Swing (50 lb)", sets: "3–4", reps: "45 sec", note: "Hip hinge driven. Explosive. Squeeze glutes at the top." },
      { name: "Option B: KB Clean (35 lb)", sets: "3–4", reps: "45 sec", note: "Smooth pull, soft catch in rack position." },
      { name: "Option B: KB Press (35 lb)", sets: "3–4", reps: "45 sec alt arms", note: "Alternate arms each rep. Brace core. Clean to rack before pressing." },
      { name: "Option B: KB Goblet Squat (50 lb)", sets: "3–4", reps: "45 sec", note: "Full depth. Pause at bottom. Drive through heels." },
      { name: "Option B: Burpee", sets: "3–4", reps: "45 sec", note: "Chest to floor, explosive jump. 2 min rest between rounds." },
    ],
    finisher: "15 sec rest between movements · 2 min rest between rounds · Start with 3 rounds"
  },
  {
    id: 3, day: "Thu", name: "Upper — Pull", tag: "Back · Biceps · Rear Delts", color: "#a855f7", isRest: false,
    exercises: [
      { name: "Barbell Bent-Over Row", sets: "4", reps: "6–8", note: "Overhand grip. Hinge to ~45°. Pull to lower chest. Squeeze shoulder blades at top." },
      { name: "DB Single-Arm Row", sets: "3", reps: "10–12 ea", note: "Brace on bench. Full range — arm fully extended at bottom, elbow past torso at top." },
      { name: "Pulley Face Pull", sets: "3", reps: "15", note: "Rope attachment. Pull to forehead, elbows high. Non-negotiable for shoulder health." },
      { name: "Pulley Lat Pulldown", sets: "4", reps: "10–12", note: "Wide grip, slight lean back. Drive elbows down and back." },
      { name: "DB Hammer Curl", sets: "3", reps: "12–15", note: "Neutral grip (thumbs up). No swinging. Controlled negative." },
    ],
    finisher: "Treadmill incline walk — Incline 6–8 · Speed 3.0–3.5 mph · 15 min"
  },
  {
    id: 4, day: "Fri", name: "Lower — Posterior", tag: "Glutes · Hamstrings · Lower Back", color: "#14b8a6", isRest: false,
    exercises: [
      { name: "Barbell Deadlift", sets: "4", reps: "5", note: "Strength anchor of the week. 180 lb baseline — add 5 lb when 5 reps feel smooth across all sets." },
      { name: "Barbell Hip Thrust", sets: "3", reps: "10–12", note: "Use bench for upper back. Full hip extension at top. Squeeze glutes hard." },
      { name: "DB Step-Up", sets: "3", reps: "12 ea", note: "Drive through the heel of the elevated foot. Don't push off the floor foot." },
      { name: "KB Single-Leg RDL (35 lb)", sets: "3", reps: "10 ea", note: "Hinge on one leg, slight bend in working knee. Slow and controlled." },
      { name: "KB Goblet Squat Hold (35 lb)", sets: "3", reps: "45 sec", note: "Hold at the bottom of the squat. Builds quad endurance and hip mobility." },
    ],
    finisher: "Treadmill incline walk — Incline 8–10 · Speed 3.0–3.5 mph · 20 min"
  },
  {
    id: 5, day: "Sat", name: "Full Rest", tag: "Recovery day", color: "#888", isRest: true,
    restTips: ["Hit your protein target (190g). Rest days are not cheat days.", "Hydrate — aim for 110 oz of water.", "Sleep 7–9 hours. This is when your body actually changes.", "Pre-log tomorrow's food tonight. Make decisions in advance."]
  },
  {
    id: 6, day: "Sun", name: "Full Rest", tag: "Recovery day", color: "#888", isRest: true,
    restTips: ["Two full rest days means better recovery and a stronger Monday.", "Review the week: Did you hit all 4 lifting days + conditioning?", "Check your deficit for the week. Are you on track?", "Meal prep for the week ahead if you can."]
  }
];

let currentDay = new Date().getDay();
currentDay = currentDay === 0 ? 6 : currentDay - 1;
currentDay = Math.min(currentDay, 6);

let sessionInputs = {};

function getStorageKey(dayId) { return `liftlog_day_${dayId}`; }
function getHistory(dayId) {
  try { return JSON.parse(localStorage.getItem(getStorageKey(dayId)) || '[]'); } catch(e) { return []; }
}
function saveHistory(dayId, entry) {
  const h = getHistory(dayId);
  h.unshift(entry);
  if (h.length > 10) h.pop();
  localStorage.setItem(getStorageKey(dayId), JSON.stringify(h));
}

function renderDayScroller() {
  const el = document.getElementById('dayScroller');
  el.innerHTML = PLAN.map(d => `
    <div class="day-pill ${d.isRest ? 'rest-day' : ''} ${d.id === currentDay ? 'active' : ''}" onclick="selectDay(${d.id})">
      <span class="day-label">${d.day}</span>
      <span class="day-name">${d.isRest ? 'Rest' : d.name.split('—')[0].trim()}</span>
    </div>`).join('');
}

function selectDay(id) {
  currentDay = id;
  sessionInputs = {};
  renderDayScroller();
  renderMain();
}

function isExLogged(dayId, exIdx) {
  const key = `ex_${dayId}_${exIdx}`;
  return sessionInputs[key] && (sessionInputs[key].reps || sessionInputs[key].weight);
}

function allLogged(day) {
  if (day.isRest) return false;
  return day.exercises.every((_, i) => isExLogged(day.id, i));
}

function renderMain() {
  const day = PLAN[currentDay];
  const content = document.getElementById('mainContent');
  const saveBar = document.getElementById('saveBar');

  if (day.isRest) {
    saveBar.style.display = 'none';
    content.innerHTML = `
      <div class="rest-screen">
        <div class="rest-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <div class="rest-title">${day.name}</div>
        <div class="rest-sub">Recovery is when your body actually changes — not during the workout.</div>
        <div class="rest-tips">
          ${day.restTips.map(t => `<div class="rest-tip"><div class="rest-tip-dot"></div><span>${t}</span></div>`).join('')}
        </div>
      </div>`;
    return;
  }

  saveBar.style.display = 'flex';
  const done = allLogged(day);
  const history = getHistory(day.id);

  content.innerHTML = `
    <div class="day-header">
      <div class="day-header-top">
        <div>
          <div class="day-title"><span class="day-accent" style="background:${day.color}"></span>${day.name}</div>
          <div class="day-tag">${day.tag}</div>
        </div>
        ${done ? `<div class="complete-badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Complete</div>` : ''}
      </div>
    </div>

    ${day.exercises.map((ex, i) => {
      const key = `ex_${day.id}_${i}`;
      const val = sessionInputs[key] || {};
      const logged = isExLogged(day.id, i);
      return `
      <div class="ex-card ${logged ? 'logged' : ''}" id="card_${i}">
        <div class="ex-card-header">
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta">${ex.sets} sets · ${ex.reps}</div>
          </div>
          <div class="ex-status">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
        <div class="ex-inputs">
          <div class="input-group">
            <div class="input-label">Reps / Time</div>
            <input class="input-field" type="text" inputmode="decimal" placeholder="${ex.reps}" value="${val.reps || ''}" oninput="updateInput(${day.id}, ${i}, 'reps', this.value)" />
          </div>
          <div class="input-group">
            <div class="input-label">Weight (lbs)</div>
            <input class="input-field" type="number" inputmode="decimal" placeholder="0" value="${val.weight || ''}" oninput="updateInput(${day.id}, ${i}, 'weight', this.value)" />
          </div>
        </div>
        <div class="note-row">
          <div class="coaching-note">${ex.note}</div>
        </div>
      </div>`;
    }).join('')}

    <div class="finisher">
      <div class="finisher-label">Conditioning finisher</div>
      <div class="finisher-text">${day.finisher}</div>
    </div>

    ${history.length ? `
      <button class="history-btn" onclick="toggleHistory()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Previous sessions (${history.length})
      </button>
      <div class="history-panel" id="historyPanel">
        ${history.map(entry => `
          <div class="history-entry">
            <div class="history-date">${entry.date}</div>
            ${entry.exercises.filter(e => e.reps || e.weight).map(e => `
              <div class="history-ex">
                <span class="history-ex-name">${e.name}</span>
                <span class="history-ex-val">${e.weight ? e.weight + ' lbs' : ''}${e.weight && e.reps ? ' · ' : ''}${e.reps || ''}</span>
              </div>`).join('')}
          </div>`).join('')}
      </div>` : ''}
  `;
}

function updateInput(dayId, exIdx, field, value) {
  const key = `ex_${dayId}_${exIdx}`;
  if (!sessionInputs[key]) sessionInputs[key] = {};
  sessionInputs[key][field] = value;
  const card = document.getElementById(`card_${exIdx}`);
  const hasData = sessionInputs[key].reps || sessionInputs[key].weight;
  if (card) {
    card.classList.toggle('logged', !!hasData);
  }
}

function saveDay() {
  const day = PLAN[currentDay];
  if (day.isRest) return;
  const entry = {
    date: new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }),
    exercises: day.exercises.map((ex, i) => {
      const key = `ex_${day.id}_${i}`;
      const val = sessionInputs[key] || {};
      return { name: ex.name, sets: ex.sets, reps: val.reps || '', weight: val.weight || '' };
    })
  };
  saveHistory(day.id, entry);
  showToast('Workout saved', 'success');
  renderMain();
}

function clearDay() {
  sessionInputs = {};
  renderMain();
  showToast('Cleared');
}

function toggleHistory() {
  const panel = document.getElementById('historyPanel');
  if (panel) panel.classList.toggle('open');
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast ' + type; }, 2000);
}

function exportToExcel() {
  const wb = XLSX.utils.book_new();

  PLAN.filter(d => !d.isRest).forEach(day => {
    const history = getHistory(day.id);
    const rows = [['Exercise', 'Target Sets', 'Target Reps', 'Date', 'Reps Logged', 'Weight (lbs)']];
    if (history.length === 0) {
      day.exercises.forEach(ex => rows.push([ex.name, ex.sets, ex.reps, '', '', '']));
    } else {
      history.forEach(entry => {
        entry.exercises.forEach(ex => {
          rows.push([ex.name, ex.sets, ex.reps, entry.date, ex.reps, ex.weight]);
        });
      });
    }
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{ wch: 28 }, { wch: 12 }, { wch: 14 }, { wch: 20 }, { wch: 14 }, { wch: 14 }];
    XLSX.utils.book_append_sheet(wb, ws, day.name.substring(0, 31));
  });

  const summaryRows = [['Day', 'Last Logged', 'Sessions Logged']];
  PLAN.filter(d => !d.isRest).forEach(day => {
    const h = getHistory(day.id);
    summaryRows.push([day.name, h.length > 0 ? h[0].date : 'Never', h.length]);
  });
  const summaryWs = XLSX.utils.aoa_to_sheet(summaryRows);
  summaryWs['!cols'] = [{ wch: 22 }, { wch: 22 }, { wch: 16 }];
  XLSX.utils.book_append_sheet(wb, summaryWs, 'Summary');

  XLSX.writeFile(wb, `LiftLog_${new Date().toISOString().split('T')[0]}.xlsx`);
  showToast('Excel file downloaded', 'success');
}

renderDayScroller();
renderMain();

const today = new Date().getDay();
const pillIdx = today === 0 ? 6 : today - 1;
setTimeout(() => {
  const pills = document.querySelectorAll('.day-pill');
  if (pills[pillIdx]) pills[pillIdx].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}, 100);
</script>
</body>
